server:
  port: 8080

spring:
  application:
    name: auth-api

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/appdb}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt-secret: ${JWT_SECRET:change-this-dev-secret-please-32chars}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  internal-token: ${INTERNAL_TOKEN:change-this-internal-token}
  data-api-url: ${DATA_API_URL:http://localhost:8081}

logging:
  level:
    root: INFO
    com.example.authapi: INFO
  # Never log request/response bodies or headers containing secrets/tokens.
